<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I'm Wired Different - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
      }
      .gradient-text {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .glow {
        box-shadow: 0 0 60px rgba(102, 126, 234, 0.3);
      }
      @keyframes pulse-slow {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body
    class="bg-gray-950 min-h-screen flex items-center justify-center overflow-hidden relative"
  >
    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden">
      <div
        class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-3xl animate-pulse-slow"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl animate-pulse-slow"
        style="animation-delay: 1.5s"
      ></div>
    </div>

    <!-- Grid pattern overlay -->
    <div
      class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:50px_50px]"
    ></div>

    <!-- Main content -->
    <main class="relative z-10 text-center px-6 max-w-3xl mx-auto">
      <!-- Logo/Brand -->
      <div class="mb-8">
        <div class="inline-flex items-center gap-3 mb-6">
          <div
            class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center glow"
          >
            <svg
              class="w-7 h-7 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
        </div>
        <h1 class="text-5xl md:text-7xl font-bold text-white mb-2">
          I'm Wired <span class="gradient-text">Different</span>
        </h1>
      </div>

      <!-- Under construction message -->
      <div class="mb-12">
        <div
          class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-6"
        >
          <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
          <span class="text-gray-400 text-sm font-medium"
            >Under Construction</span
          >
        </div>
        <p class="text-xl md:text-2xl text-gray-400 leading-relaxed">
          Something exciting is coming.<br class="hidden md:block" />
          A blog for those who think
          <span class="text-white font-medium">differently</span>.
        </p>
      </div>

      <!-- Progress indicator -->
      <div class="mb-12 max-w-md mx-auto">
        <div class="flex justify-between text-sm text-gray-500 mb-2">
          <span>Building in progress</span>
          <span>Stay tuned</span>
        </div>
        <div class="h-1 bg-white/10 rounded-full overflow-hidden">
          <div
            class="h-full w-2/3 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full"
          ></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="absolute bottom-6 left-0 right-0 text-center text-gray-600 text-sm"
    >
      <p>&copy; 2026 I'm Wired Different. All rights reserved.</p>
    </footer>
  </body>
</html>
